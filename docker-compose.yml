services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - '${MYSQL_PORT}:3306'
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network

  adminer:
    image: adminer:latest
    restart: unless-stopped
    depends_on:
      - mysql
    ports:
      - '${ADMINER_PORT}:8080'
    networks:
      - app-network

volumes:
  db-data:

networks:
  app-network:
    driver: bridge
